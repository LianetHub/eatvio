@@if(typeof planTitle !== 'undefined') {
<div class="diary__plan">
    <a href="" class="diary__plan-title">@@planTitle</a>
    <div class="diary__plan-current">День 1 из 14</div>
</div>
}
<div class="diary__main-filters">
    <div class="diary__main-column">
        <div class="diary__main-filter">
            <input type="text" name="product-name" class="input input-white@@if(typeof hasError !== 'undefined' && hasError===true){ error}" placeholder="Введите название продукта">
            @@if(typeof hasError !== 'undefined' && hasError===true){
            <div class="error-message icon-info">
                Введите название продукта
            </div>
            }
        </div>
    </div>
    <div class="diary__main-column">
        <div class="diary__main-grid">
            <div class="diary__main-filter" data-unit="Гр">
                <input type="text" name="quantity" class="input input-white@@if(typeof hasError !== 'undefined' && hasError===true){ error}" placeholder="Кол-во">
                @@if(typeof hasError !== 'undefined' && hasError===true){
                <div class="error-message icon-info">
                    Введите количество
                </div>
                }
            </div>
            <a href="#product" data-modal class="diary__main-btn l-btn l-btn-primary l-btn-sm l-btn-fullwidth">
                Добавить продукт
            </a>
        </div>
    </div>
</div>
