<div class="diary__product-slider swiper">
    <button type="button" class="diary__product-remove icon-close"></button>
    <div class="swiper-wrapper">
        <div class="diary__product-image swiper-slide">
            <img src="@img/product-21.jpg" class="cover-image" alt="product">
        </div>
        <div class="diary__product-image swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="product">
        </div>
        <div class="diary__product-image swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="product">
        </div>
        <div class="diary__product-image swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="product">
        </div>
        <div class="diary__product-image swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="product">
        </div>
    </div>
    <div class="diary__product-prev swiper-button-prev"></div>
    <div class="diary__product-next swiper-button-next"></div>
</div>
<div class="diary__product-thumbs swiper">
    <div class="swiper-wrapper">
        <div class="diary__product-thumb swiper-slide">
            <img src="@img/product-21.jpg" class="cover-image" alt="thumb">
        </div>
        <div class="diary__product-thumb swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="thumb">
        </div>
        <div class="diary__product-thumb swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="thumb">
        </div>
        <div class="diary__product-thumb swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="thumb">
        </div>
        <div class="diary__product-thumb swiper-slide">
            <img src="@img/product-3.jpg" class="cover-image" alt="thumb">
        </div>
        @@if(typeof hidePlus == 'undefined') {
            <button type="button" class="diary__product-add icon-plus"></button>
        }
    </div>
</div>
