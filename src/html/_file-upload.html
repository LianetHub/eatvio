<label class="file @@className">
    <input type="file" name="file" class="file__input hidden" hidden>
    <span class="file__content">
        <span class="file__add icon-plus"></span>
        @@if(typeof title !== 'undefined') {
        <span class="file__title">
            @@title
        </span>
        }
        @@if(typeof desc !== 'undefined') {
        <span class="file__desc pc-only">
            @@desc
        </span>
        }
        @@if(typeof formats !== 'undefined') {
        <span class="file__formats icon-picture">
            @@formats
        </span>
        }

    </span>
</label>
